<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Product Locator</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#1a5276"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Locator"/>
<style>
  :root {
    --primary:#1a5276;--accent:#2e86c1;--bg:#f0f4f8;--card:#fff;
    --text:#1c2833;--sub:#566573;--border:#d5d8dc;
    --radius:14px;--shadow:0 4px 18px rgba(0,0,0,.10);
    --safe-top:env(safe-area-inset-top,0px);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--text);min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;
    padding:calc(var(--safe-top) + 24px) 16px 48px;
  }
  header{width:100%;max-width:520px;text-align:center;margin-bottom:28px}
  header h1{font-size:1.7rem;font-weight:800;color:var(--primary);letter-spacing:-.3px}
  header p{margin-top:6px;font-size:.9rem;color:var(--sub)}
  .search-wrap{position:relative;width:100%;max-width:520px}
  #searchInput{
    width:100%;padding:16px 50px 16px 18px;font-size:1.05rem;
    border:2px solid var(--border);border-radius:var(--radius);outline:none;
    background:var(--card);color:var(--text);
    transition:border-color .2s,box-shadow .2s;
    -webkit-appearance:none;box-shadow:var(--shadow);
  }
  #searchInput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(46,134,193,.18)}
  .clear-btn{
    position:absolute;right:14px;top:50%;transform:translateY(-50%);
    background:none;border:none;cursor:pointer;color:var(--sub);
    font-size:1.3rem;display:none;line-height:1;padding:6px;
    -webkit-tap-highlight-color:transparent;
  }
  .hint{font-size:.78rem;color:var(--sub);margin-top:7px;text-align:center}
  #dropdown{
    position:absolute;top:calc(100% + 6px);left:0;right:0;
    background:var(--card);border:1px solid var(--border);
    border-radius:var(--radius);box-shadow:var(--shadow);
    max-height:300px;overflow-y:auto;-webkit-overflow-scrolling:touch;
    z-index:100;display:none;
  }
  .dd-item{
    padding:13px 16px;cursor:pointer;font-size:.95rem;
    display:flex;justify-content:space-between;align-items:center;gap:10px;
    border-bottom:1px solid var(--border);transition:background .12s;
    -webkit-tap-highlight-color:transparent;
  }
  .dd-item:last-of-type{border-bottom:none}
  .dd-item:hover,.dd-item.active{background:#eaf2fb}
  .dd-product{flex:1;font-weight:500}
  .dd-bin{
    font-size:.82rem;color:var(--sub);white-space:nowrap;
    background:#eaf2fb;padding:2px 7px;border-radius:20px;
    font-weight:600;letter-spacing:.5px;
  }
  mark{background:#aed6f1;border-radius:3px;padding:0 1px;font-style:normal}
  .dd-more{padding:9px 16px;font-size:.78rem;color:var(--sub);text-align:center;font-style:italic}
  #resultCard{
    display:none;margin-top:28px;width:100%;max-width:520px;
    background:var(--card);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;animation:pop .22s ease;
  }
  @keyframes pop{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
  .card-header{
    background:var(--primary);color:#fff;padding:12px 20px;
    font-size:.75rem;text-transform:uppercase;letter-spacing:1px;font-weight:700;
  }
  .card-body{padding:20px 22px 24px}
  .product-name{font-size:1.1rem;font-weight:600;color:var(--text);word-break:break-word}
  .bin-label{margin-top:10px;font-size:.75rem;color:var(--sub);text-transform:uppercase;letter-spacing:.8px}
  .bin-value{margin-top:6px;font-size:3.2rem;font-weight:900;color:var(--accent);letter-spacing:3px;line-height:1}
  #noResult{
    display:none;margin-top:28px;width:100%;max-width:520px;
    text-align:center;color:var(--sub);font-size:.95rem;
    padding:20px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  }
  footer{margin-top:auto;padding-top:36px;font-size:.72rem;color:#bdc3c7;text-align:center}
</style>
</head>
<body>
<header>
  <h1>&#x1F4E6; Product Locator</h1>
  <p>Van Paper Company &mdash; warehouse bin lookup</p>
</header>
<div class="search-wrap">
  <input id="searchInput" type="search"
    autocomplete="off" autocorrect="off" autocapitalize="characters"
    spellcheck="false" placeholder="Type at least 3 characters..."
    inputmode="search" aria-label="Search products"
    aria-autocomplete="list" aria-controls="dropdown"/>
  <button class="clear-btn" id="clearBtn" aria-label="Clear">&#x2715;</button>
  <div id="dropdown" role="listbox"></div>
</div>
<p class="hint">Type 3+ characters &mdash; tap a result to see the bin</p>
<div id="resultCard" role="region" aria-live="polite">
  <div class="card-header">Location Found</div>
  <div class="card-body">
    <div class="product-name" id="resProduct"></div>
    <div class="bin-label">Bin</div>
    <div class="bin-value" id="resBin"></div>
  </div>
</div>
<div id="noResult" role="status">No matching products found.</div>
<footer>10,255 products loaded</footer>

  var map=new Map(DATA.map(function(r){return[r[0].toUpperCase(),r];}));

  var dropdown=document.getElementById('dropdown');
  var clearBtn=document.getElementById('clearBtn');
  var resultCard=document.getElementById('resultCard');
  var noResult=document.getElementById('noResult');
  var resProduct=document.getElementById('resProduct');
  var resBin=document.getElementById('resBin');
  var MAX=80,activeIdx=-1;

  function esc(s){return s.replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];});}
  function highlight(text,q){
    var i=text.toUpperCase().indexOf(q.toUpperCase());
    if(i<0)return esc(text);
    return esc(text.slice(0,i))+'<mark>'+esc(text.slice(i,i+q.length))+'</mark>'+esc(text.slice(i+q.length));
  }
  function showResult(p,b){
    resProduct.textContent=p;resBin.textContent=b;
    resultCard.style.display='block';noResult.style.display='none';
    resultCard.style.animation='none';
    requestAnimationFrame(function(){resultCard.style.animation='';});
  }
  function hideResult(){resultCard.style.display='none';noResult.style.display='none';}
  function closeDD(){dropdown.style.display='none';dropdown.innerHTML='';activeIdx=-1;}
  function openDD(matches,query){
    dropdown.innerHTML='';activeIdx=-1;
    matches.slice(0,MAX).forEach(function(row){
      var p=row[0],b=row[1];
      var div=document.createElement('div');
      div.className='dd-item';div.setAttribute('role','option');
      div.innerHTML='<span class="dd-product">'+highlight(p,query)+'</span><span class="dd-bin">'+esc(b)+'</span>';
      div.addEventListener('touchstart',function(e){e.preventDefault();selectItem(p,b);},{passive:false});
      div.addEventListener('mousedown',function(e){e.preventDefault();selectItem(p,b);});
      dropdown.appendChild(div);
    });
    if(matches.length>MAX){
      var more=document.createElement('div');
      more.className='dd-more';
      more.textContent=(matches.length-MAX)+' more — keep typing to narrow';
      dropdown.appendChild(more);
    }
    dropdown.style.display='block';
  }
  function selectItem(p,b){
    input.value=p;clearBtn.style.display='inline';
    closeDD();showResult(p,b);input.blur();
  }
  function search(query){
    if(query.length<3){closeDD();hideResult();return;}
    var q=query.toUpperCase();
    var matches=DATA.filter(function(r){return r[0].toUpperCase().indexOf(q)>=0;});
    if(!matches.length){
      closeDD();resultCard.style.display='none';noResult.style.display='block';return;
    }
    noResult.style.display='none';
    var exact=map.get(q);
    if(exact)showResult(exact[0],exact[1]);else hideResult();
    openDD(matches,query);
  }

    var v=input.value;
    clearBtn.style.display=v?'inline':'none';
    search(v);
  });
  input.addEventListener('keydown',function(e){
    var items=dropdown.querySelectorAll('.dd-item');
    if(!items.length)return;
    if(e.key==='ArrowDown'){e.preventDefault();activeIdx=Math.min(activeIdx+1,items.length-1);}

  });

  });
